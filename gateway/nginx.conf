upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend;
    }

    location / {
        alias /staticfiles/;
        index index.html;
    }
}
