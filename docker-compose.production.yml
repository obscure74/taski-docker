version: '3'

volumes:
  pg_data:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: obscure74/taski_backend:latest
    env_file: .env
    volumes:
      - static_volume:/app/static
    depends_on:
      - db

  frontend:
    image: obscure74/taski_frontend:latest
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: obscure74/taski_gateway:latest
    ports:
      - "8000:80"
    volumes:
      - static_volume:/staticfiles
    depends_on:
      - backend
      - frontend