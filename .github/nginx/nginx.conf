upstream backend {
    server backend:8000;
}

server {
    server_tokens off;
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
    }

    location /static/ {
        root /staticfiles;
    }

    location / {
        root /staticfiles;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}